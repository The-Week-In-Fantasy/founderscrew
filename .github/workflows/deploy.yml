name: Build and Deploy to Cloud Run

on:
  push:
    branches:
      - main

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GAR_LOCATION: us-central1
  REPOSITORY: founderscrew
  SERVICE: founderscrew
  WORKER_POOL: founderscrew-worker
  REGION: us-central1

jobs:
  deploy:
    name: Deploy to Cloud Run
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Google Auth
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/277445815306/locations/global/workloadIdentityPools/github-actions-pool/providers/github-actions-provider'
          service_account: 'gh-deployer@gen-lang-client-0433063216.iam.gserviceaccount.com'

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: |
          gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Build and Push Container
        run: |
          IMAGE_TAG="us-central1-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.SERVICE }}:${{ github.sha }}"
          docker build -t "$IMAGE_TAG" .
          docker push "$IMAGE_TAG"
          echo "IMAGE=$IMAGE_TAG" >> $GITHUB_ENV

      - name: Deploy to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE }}
          region: ${{ env.REGION }}
          image: us-central1-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.SERVICE }}:${{ github.sha }}
          env_vars: |
            FOUNDERSCREW_STORAGE_BACKEND=firestore
            GOOGLE_CLOUD_PROJECT=${{ env.PROJECT_ID }}
            GITHUB_TOKEN=${{ secrets.GH_TOKEN }}
            GOOGLE_API_KEY=${{ secrets.GOOGLE_API_KEY }}
            DASHBOARD_PASSWORD=${{ secrets.DASHBOARD_PASSWORD }}

      - name: Deploy Workflow Worker Pool
        run: |
          gcloud run worker-pools deploy "${{ env.WORKER_POOL }}" \
            --image "$IMAGE" \
            --region "${{ env.REGION }}" \
            --command founders-crew \
            --args worker \
            --set-env-vars FOUNDERSCREW_STORAGE_BACKEND=firestore,GOOGLE_CLOUD_PROJECT=${{ env.PROJECT_ID }},GITHUB_TOKEN=${{ secrets.GH_TOKEN }},GOOGLE_API_KEY=${{ secrets.GOOGLE_API_KEY }}

      - name: Show Deploy Output
        run: |
          echo "Service deployed successfully!"
          echo "Worker pool deployed successfully!"
          echo "URL: ${{ steps.deploy.outputs.url }}"
